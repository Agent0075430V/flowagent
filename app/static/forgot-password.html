<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowAgent | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=20260406" />
  </head>
  <body data-page="forgot-password">
    <main class="auth-shell" aria-label="Forgot password">
      <a class="back-home" href="/">Back to home</a>
      <section class="auth-card">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Request OTP, then verify it with your new password.</p>

        <form id="forgotPasswordForm" class="auth-form">
          <label class="field-label" for="forgotEmail">Email</label>
          <input id="forgotEmail" class="text-input" type="email" required placeholder="you@example.com" />

          <button id="requestResetOtpBtn" class="btn btn-secondary" type="button">Send OTP</button>

          <div id="forgotStepTwo" class="confirm-wrap hidden">
            <label class="field-label" for="forgotOtp">OTP</label>
            <input id="forgotOtp" class="text-input" type="text" maxlength="6" placeholder="6-digit code" />

            <label class="field-label" for="forgotNewPassword">New Password</label>
            <input id="forgotNewPassword" class="text-input" type="password" placeholder="At least 8 characters" />

            <label class="field-label" for="forgotConfirmPassword">Confirm New Password</label>
            <input id="forgotConfirmPassword" class="text-input" type="password" placeholder="Re-enter password" />

            <button id="resetPasswordBtn" class="btn btn-primary" type="submit">Reset Password</button>
          </div>
        </form>

        <p id="forgotMessage" class="auth-message"></p>
      </section>
    </main>
    <script src="/static/app.js?v=20260406" defer></script>
  </body>
</html>
